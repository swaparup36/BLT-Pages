name: Update Leaderboard

on:
  # Regenerate every 6 hours
  schedule:
    - cron: "0 */6 * * *"

  # Also regenerate whenever a bug-labelled issue is opened or closed
  issues:
    types:
      - opened
      - labeled
      - closed
      - reopened

  # Regenerate when a comment is added or edited on any issue
  issue_comment:
    types:
      - created
      - edited

  # Allow manual runs from the Actions UI
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  update-leaderboard:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Add eyes reaction to new issue
        if: github.event_name == 'issues' && github.event.action == 'opened'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssue({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              content: 'eyes',
            });

      - name: Add domain label to new issue
        if: github.event_name == 'issues' && github.event.action == 'opened'
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';
            // Use the same two-newline pattern as extractDomain() in the leaderboard step
            const match = body.match(/### URL\s*\n{2}\s*(https?:\/\/[^\s]+)/);
            if (!match) return;

            let hostname = null;
            try { hostname = new URL(match[1]).hostname; } catch { /* ignore */ }
            if (!hostname) return;

            // Truncate to 50 chars to stay within GitHub's label name limit (50 chars)
            const labelName = `domain: ${hostname}`.slice(0, 50);

            // Ensure the label exists (create if missing)
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                name:  labelName,
              });
            } catch (e) {
              if (e.status === 404) {
                try {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo:  context.repo.repo,
                    name:  labelName,
                    color: '0075ca',
                    description: `Issues related to ${hostname}`,
                  });
                } catch (createError) {
                  // If the label was created concurrently by another workflow run,
                  // GitHub may return 422 "Unprocessable Entity" (already exists).
                  if (createError.status !== 422) {
                    throw createError;
                  }
                }
              } else {
                throw e;
              }
            }

            // Apply the label to the issue
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.payload.issue.number,
              labels: [labelName],
            });

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate leaderboard data
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // Fetch all issues labelled "bug" (paginate through all pages)
            const issues = await github.paginate(
              github.rest.issues.listForRepo,
              {
                owner: context.repo.owner,
                repo:  context.repo.repo,
                labels: 'bug',
                state:  'all',
                per_page: 100,
              }
            );

            // Filter out PRs (GitHub returns PRs in the issues endpoint)
            const bugIssues = issues.filter(i => !i.pull_request);

            // Tally reporters and extract org names
            const counts  = {};   // login → { count, avatar_url, profile_url }
            const orgSet  = new Set();

            for (const issue of bugIssues) {
              const login = issue.user.login;

              if (!counts[login]) {
                counts[login] = {
                  count:       0,
                  avatar_url:  issue.user.avatar_url,
                  profile_url: issue.user.html_url,
                };
              }
              counts[login].count++;

              // Try to extract ORG_NAME from the issue body
              if (issue.body) {
                const match = issue.body.match(/### Organization Name.*?\n\n(.+)/s);
                if (match) orgSet.add(match[1].trim().split('\n')[0]);
              }
            }

            // Sort descending by report count
            const leaderboard = Object.entries(counts)
              .sort(([, a], [, b]) => b.count - a.count)
              .slice(0, 50)
              .map(([login, data], idx) => ({
                rank:        idx + 1,
                login,
                count:       data.count,
                avatar_url:  data.avatar_url,
                profile_url: data.profile_url,
              }));

            // Extract domain from the URL field in an issue body
            function extractDomain(body) {
              if (!body) return null;
              const match = body.match(/### URL\s*\n\n(https?:\/\/([^/\s\n]+))/);
              if (!match) return null;
              try { return new URL(match[1]).hostname; } catch { return null; }
            }

            // Build top-domains leaderboard
            const domainCounts = {};
            for (const issue of bugIssues) {
              const domain = extractDomain(issue.body);
              if (domain) domainCounts[domain] = (domainCounts[domain] || 0) + 1;
            }
            const topDomains = Object.entries(domainCounts)
              .sort(([, a], [, b]) => b - a)
              .slice(0, 20)
              .map(([domain, count], idx) => ({ rank: idx + 1, domain, count }));

            // Build top-commenters leaderboard (fetch all issues' comments in parallel)
            const commentCounts = {};
            const allCommentArrays = await Promise.all(
              bugIssues.map(issue =>
                github.paginate(
                  github.rest.issues.listComments,
                  {
                    owner: context.repo.owner,
                    repo:  context.repo.repo,
                    issue_number: issue.number,
                    per_page: 100,
                  }
                )
              )
            );
            for (const comments of allCommentArrays) {
              for (const comment of comments) {
                const login = comment.user.login;
                // Skip bot accounts
                if (login.endsWith('[bot]')) continue;
                if (!commentCounts[login]) {
                  commentCounts[login] = {
                    count:       0,
                    avatar_url:  comment.user.avatar_url,
                    profile_url: comment.user.html_url,
                  };
                }
                commentCounts[login].count++;
              }
            }
            const topCommenters = Object.entries(commentCounts)
              .sort(([, a], [, b]) => b.count - a.count)
              .slice(0, 20)
              .map(([login, data], idx) => ({
                rank:        idx + 1,
                login,
                count:       data.count,
                avatar_url:  data.avatar_url,
                profile_url: data.profile_url,
              }));

            // Extract first image URL from an issue body (markdown or HTML)
            function extractFirstImage(body) {
              if (!body) return null;
              const mdMatch = body.match(/!\[.*?\]\((https?:\/\/[^\s)]+)\)/);
              if (mdMatch) return mdMatch[1];
              const htmlMatch = body.match(/<img[^>]+src=["'](https?:\/\/[^\s"']+)["']/i);
              if (htmlMatch) return htmlMatch[1];
              return null;
            }

            // Collect the 3 most-recently-created bug issues
            const sortedByDate = [...bugIssues].sort(
              (a, b) => new Date(b.created_at) - new Date(a.created_at)
            );
            const recentBugs = sortedByDate.slice(0, 3).map(issue => ({
              number:     issue.number,
              title:      issue.title,
              html_url:   issue.html_url,
              created_at: issue.created_at,
              user: {
                login:       issue.user.login,
                avatar_url:  issue.user.avatar_url,
                profile_url: issue.user.html_url,
              },
              image_url: extractFirstImage(issue.body),
            }));

            const payload = {
              updated_at:     new Date().toISOString(),
              total_bugs:     bugIssues.length,
              total_domains:  Object.keys(domainCounts).length,
              total_orgs:     orgSet.size,
              leaderboard,
              top_commenters: topCommenters,
              top_domains:    topDomains,
              recent_bugs:    recentBugs,
            };

            fs.mkdirSync('data', { recursive: true });
            fs.writeFileSync(
              'data/leaderboard.json',
              JSON.stringify(payload, null, 2) + '\n'
            );

            console.log(
              `Leaderboard updated: ${bugIssues.length} bugs, ` +
              `${leaderboard.length} reporters, ${orgSet.size} orgs, ` +
              `${topCommenters.length} commenters, ${payload.total_domains} domains`
            );

      - name: Commit updated leaderboard
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git add data/leaderboard.json
          # Only commit and push if there are actual changes
          if ! git diff --staged --quiet; then
            git commit -m "chore: update leaderboard data [skip ci]"
            git pull --rebase
            git push
          fi
