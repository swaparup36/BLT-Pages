name: Update Leaderboard and Deploy

on:
  # Regenerate every 6 hours
  schedule:
    - cron: "0 */6 * * *"

  # Also regenerate whenever a bug-labelled issue is opened or closed
  issues:
    types:
      - opened
      - labeled
      - closed
      - reopened

  # Regenerate when a comment is added or edited on any issue
  issue_comment:
    types:
      - created
      - edited

  # Deploy when code is pushed to main
  push:
    branches:
      - main

  # Allow manual runs from the Actions UI
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Add eyes reaction to new issue
        if: github.event_name == 'issues' && github.event.action == 'opened'
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = context.payload.issue?.number;
            if (!issueNumber) return;

            try {
              await github.rest.reactions.createForIssue({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: issueNumber,
                content: 'eyes',
              });
            } catch (e) {
              // Ignore if already reacted or other minor error
              console.log('Reaction failed:', e.message);
            }

      - name: Add domain label to new issue
        if: github.event_name == 'issues' && github.event.action == 'opened'
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';
            // Use the standard pattern for URL extraction
            const match = body.match(/### URL\s*\n\n(\S+)/);
            if (!match) return;

            let hostname = null;
            try { hostname = new URL(match[1]).hostname; } catch { /* ignore */ }
            if (!hostname) return;

            // Truncate to 50 chars to stay within GitHub's label name limit (50 chars)
            const labelName = `domain: ${hostname}`.slice(0, 50);

            // Ensure the label exists (create if missing)
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                name:  labelName,
              });
            } catch (e) {
              if (e.status === 404) {
                try {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo:  context.repo.repo,
                    name:  labelName,
                    color: '0075ca',
                    description: `Issues related to ${hostname}`,
                  });
                } catch (createError) {
                  // If the label was created concurrently by another workflow run,
                  // GitHub may return 422 "Unprocessable Entity" (already exists).
                  if (createError.status !== 422) {
                    throw createError;
                  }
                }
              } else {
                throw e;
              }
            }
            const issueNumber = context.payload.issue?.number;
            if (!issueNumber) return;

            // Apply the label to the issue
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: issueNumber,
              labels: [labelName],
            });

      - name: Checkout repository
        uses: actions/checkout@v4

      # Skip leaderboard data generation when this run was triggered by the
      # bot's own leaderboard-update commit (push by github-actions[bot]).
      # This prevents an infinite trigger loop while still deploying the
      # freshly-committed content.
      - name: Generate leaderboard data
        if: github.event_name != 'push' || github.actor != 'github-actions[bot]'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // Fetch all issues labelled "bug" (paginate through all pages)
            const issues = await github.paginate(
              github.rest.issues.listForRepo,
              {
                owner: context.repo.owner,
                repo:  context.repo.repo,
                labels: 'bug',
                state:  'all',
                per_page: 100,
              }
            );

            // Filter out PRs (GitHub returns PRs in the issues endpoint)
            const bugIssues = issues.filter(i => !i.pull_request);

            // Tally reporters and extract org names
            const counts  = {};   // login → { count, avatar_url, profile_url }
            const orgSet  = new Set();

            for (const issue of bugIssues) {
              const login = issue.user.login;

              if (!counts[login]) {
                counts[login] = {
                  count:       0,
                  avatar_url:  issue.user.avatar_url,
                  profile_url: issue.user.html_url,
                };
              }
              counts[login].count++;

              // Try to extract ORG_NAME from the issue body
              if (issue.body) {
                const match = issue.body.match(/### Organization Name.*?\n\n(.+)/s);
                if (match) orgSet.add(match[1].trim().split('\n')[0]);
              }
            }

            // Sort descending by report count
            const leaderboard = Object.entries(counts)
              .sort(([, a], [, b]) => b.count - a.count)
              .slice(0, 50)
              .map(([login, data], idx) => ({
                rank:        idx + 1,
                login,
                count:       data.count,
                avatar_url:  data.avatar_url,
                profile_url: data.profile_url,
              }));

            // Extract domain from the URL field in an issue body
            function extractDomain(body) {
              if (!body) return null;
              const match = body.match(/### URL\s*\n\n(\S+)/);
              if (!match) return null;
              let rawUrl = match[1].trim();
              if (rawUrl.startsWith('//')) {
                rawUrl = 'https:' + rawUrl;
              } else if (!rawUrl.startsWith('http://') && !rawUrl.startsWith('https://')) {
                rawUrl = 'https://' + rawUrl;
              }
              try { return new URL(rawUrl).hostname || null; } catch { return null; }
            }

            // Build top-domains leaderboard
            const domainCounts = {};
            for (const issue of bugIssues) {
              const domain = extractDomain(issue.body);
              if (domain) domainCounts[domain] = (domainCounts[domain] || 0) + 1;
            }
            const topDomains = Object.entries(domainCounts)
              .sort(([, a], [, b]) => b - a)
              .slice(0, 20)
              .map(([domain, count], idx) => ({ rank: idx + 1, domain, count }));

            // Build top-commenters leaderboard (fetch all issues' comments in parallel)
            const commentCounts = {};
            const allCommentArrays = await Promise.all(
              bugIssues.map(issue =>
                github.paginate(
                  github.rest.issues.listComments,
                  {
                    owner: context.repo.owner,
                    repo:  context.repo.repo,
                    issue_number: issue.number,
                    per_page: 100,
                  }
                )
              )
            );
            for (const comments of allCommentArrays) {
              for (const comment of comments) {
                const login = comment.user.login;
                // Skip bot accounts
                if (login.endsWith('[bot]')) continue;
                if (!commentCounts[login]) {
                  commentCounts[login] = {
                    count:       0,
                    avatar_url:  comment.user.avatar_url,
                    profile_url: comment.user.html_url,
                  };
                }
                commentCounts[login].count++;
              }
            }
            const topCommenters = Object.entries(commentCounts)
              .sort(([, a], [, b]) => b.count - a.count)
              .slice(0, 20)
              .map(([login, data], idx) => ({
                rank:        idx + 1,
                login,
                count:       data.count,
                avatar_url:  data.avatar_url,
                profile_url: data.profile_url,
              }));

            // Extract first image URL from an issue body (markdown or HTML)
            function extractFirstImage(body) {
              if (!body) return null;
              const mdMatch = body.match(/!\[.*?\]\((https?:\/\/[^\s)]+)\)/);
              if (mdMatch) return mdMatch[1];
              const htmlMatch = body.match(/<img[^>]+src=["'](https?:\/\/[^\s"']+)["']/i);
              if (htmlMatch) return htmlMatch[1];
              return null;
            }

            // Build a map from issue number to its fetched comments
            const issueCommentsMap = {};
            for (let i = 0; i < bugIssues.length; i++) {
              issueCommentsMap[bugIssues[i].number] = allCommentArrays[i];
            }

            // Collect the 3 most-recently-created open bug issues
            const sortedByDate = [...bugIssues].filter(i => i.state === 'open').sort(
              (a, b) => new Date(b.created_at) - new Date(a.created_at)
            );
            const recentBugs = sortedByDate.slice(0, 3).map(issue => {
              const comments = issueCommentsMap[issue.number] || [];
              const latestComment = comments.length > 0 ? comments[comments.length - 1] : null;
              return {
                number:        issue.number,
                title:         issue.title,
                html_url:      issue.html_url,
                created_at:    issue.created_at,
                comment_count: issue.comments,
                user: {
                  login:       issue.user.login,
                  avatar_url:  issue.user.avatar_url,
                  profile_url: issue.user.html_url,
                },
                image_url: extractFirstImage(issue.body),
                domain:    extractDomain(issue.body),
                reactions: (function() {
                  const r = issue.reactions || {};
                  const out = {};
                  for (const k of ['+1','-1','laugh','hooray','confused','heart','rocket','eyes']) {
                    if (r[k] > 0) out[k] = r[k];
                  }
                  return out;
                })(),
                latest_comment: latestComment ? {
                  body:       latestComment.body,
                  created_at: latestComment.created_at,
                  html_url:   latestComment.html_url,
                  user: {
                    login:       latestComment.user.login,
                    avatar_url:  latestComment.user.avatar_url,
                    profile_url: latestComment.user.html_url,
                  },
                } : null,
              };
            });

            const payload = {
              updated_at:     new Date().toISOString(),
              commit_sha:     context.sha,
              total_bugs:     bugIssues.length,
              open_bugs:      bugIssues.filter(i => i.state === 'open').length,
              closed_bugs:    bugIssues.filter(i => i.state === 'closed').length,
              total_domains:  Object.keys(domainCounts).length,
              total_orgs:     orgSet.size,
              leaderboard,
              top_commenters: topCommenters,
              top_domains:    topDomains,
              recent_bugs:    recentBugs,
            };

            fs.mkdirSync('data', { recursive: true });
            fs.writeFileSync(
              'data/leaderboard.json',
              JSON.stringify(payload, null, 2) + '\n'
            );

            // Embed the JSON data inline into index.html so the page needs no
            // additional HTTP request to load leaderboard data on page load.
            const indexPath = 'index.html';
            let html = fs.readFileSync(indexPath, 'utf8');
            const inlineScript = `<script id="leaderboard-inline-data">window.__BLT_LEADERBOARD__ = ${JSON.stringify(payload).replace(/<\/script>/gi, '<\\/script>')};</script>`;
            html = html.replace(
              /<script id="leaderboard-inline-data">[\s\S]*?<\/script>/,
              inlineScript
            );

            // ── Server-side rendering helpers ──────────────────────────────
            function escHtml(str) {
              return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
            }
            function fmtNum(n) {
              if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
              return String(n);
            }
            function ssrTimeAgo(dateString) {
              const seconds = Math.floor((Date.now() - new Date(dateString)) / 1000);
              if (seconds < 60) return 'just now';
              const minutes = Math.floor(seconds / 60);
              if (minutes < 60) return `${minutes} minute${minutes === 1 ? '' : 's'} ago`;
              const hours = Math.floor(minutes / 60);
              if (hours < 24) return `${hours} hour${hours === 1 ? '' : 's'} ago`;
              const days = Math.floor(hours / 24);
              if (days < 7) return `${days} day${days === 1 ? '' : 's'} ago`;
              const weeks = Math.floor(days / 7);
              if (weeks < 5) return `${weeks} week${weeks === 1 ? '' : 's'} ago`;
              const months = Math.floor(days / 30);
              if (months < 12) return `${months} month${months === 1 ? '' : 's'} ago`;
              const years = Math.floor(days / 365);
              return `${years} year${years === 1 ? '' : 's'} ago`;
            }
            const REACTION_EMOJIS = { '+1':'👍','-1':'👎','laugh':'😄','hooray':'🎉','confused':'😕','heart':'❤️','rocket':'🚀','eyes':'👀' };
            function ssrReactions(reactions) {
              if (!reactions) return '';
              return Object.entries(reactions)
                .filter(([, c]) => c > 0)
                .map(([type, count]) => {
                  const emoji = REACTION_EMOJIS[type] || '❓';
                  const label = `${type}: ${count}`;
                  return `<span class="inline-flex items-center gap-0.5 px-1.5 py-0.5 bg-gray-100 dark:bg-gray-700 rounded-full text-xs text-gray-700 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors align-middle" title="${label}" aria-label="${label}"><span aria-hidden="true">${emoji}</span><span class="font-medium">${count}</span></span>`;
                })
                .join(' ');
            }
            const rankIcons = ['🥇','🥈','🥉'];
            const SAFE_HOSTNAME_RE = /^[a-zA-Z0-9][a-zA-Z0-9\-]{0,61}[a-zA-Z0-9]?(?:\.[a-zA-Z0-9][a-zA-Z0-9\-]{0,61}[a-zA-Z0-9]?)*$/;

            // ── Pre-render stat numbers ────────────────────────────────────
            html = html.replace(
              /(<dd id="stat-total-bugs"[^>]*>)[^<]*/,
              `$1${fmtNum(payload.total_bugs)}`
            );
            html = html.replace(
              /(<dd id="stat-domains"[^>]*>)[^<]*/,
              `$1${payload.total_domains != null ? fmtNum(payload.total_domains) : '-'}`
            );
            html = html.replace(
              /(<dd id="stat-reporters"[^>]*>)[^<]*/,
              `$1${fmtNum(payload.leaderboard.length)}`
            );

            // ── Pre-render header bug counts ───────────────────────────────
            html = html.replace(
              /(<span id="header-stat-total"[^>]*>)[^<]*/,
              `$1${fmtNum(payload.total_bugs)}`
            );
            html = html.replace(
              /(<span id="header-stat-open"[^>]*>)[^<]*/,
              `$1${fmtNum(payload.open_bugs)}`
            );
            html = html.replace(
              /(<span id="header-stat-closed"[^>]*>)[^<]*/,
              `$1${fmtNum(payload.closed_bugs)}`
            );

            // ── Pre-render leaderboard-updated timestamp ───────────────────
            if (payload.updated_at) {
              const updatedDate = new Date(payload.updated_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
              html = html.replace(
                /(<p id="leaderboard-updated")([^>]*>)[\s\S]*?(<\/p>)/,
                `$1$2Updated ${escHtml(updatedDate)}$3`
              );
            }

            // ── Pre-render homepage-updated timestamp ──────────────────────
            if (payload.updated_at) {
              const updatedDate = new Date(payload.updated_at).toLocaleString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit', timeZone: 'UTC', timeZoneName: 'short' });
              const sha = typeof payload.commit_sha === 'string' && /^[0-9a-f]{7,40}$/i.test(payload.commit_sha) ? payload.commit_sha : null;
              let homepageTsHtml = `Last updated: ${escHtml(updatedDate)}`;
              if (sha) {
                const repo = process.env.GITHUB_REPOSITORY || 'OWASP-BLT/BLT-Pages';
                const commitUrl = `https://github.com/${repo}/commit/${sha}`;
                homepageTsHtml += ` &mdash; <a href="${escHtml(commitUrl)}" target="_blank" rel="noopener noreferrer" class="hover:underline">${escHtml(sha.slice(0, 7))}</a>`;
              }
              html = html.replace(
                /(<p id="homepage-updated")([^>]*>)[\s\S]*?(<\/p>)/,
                `$1$2${homepageTsHtml}$3`
              );
            }

            // ── Pre-render leaderboard rows ────────────────────────────────
            let leaderboardRowsHtml;
            if (!payload.leaderboard || payload.leaderboard.length === 0) {
              leaderboardRowsHtml = `<tr><td colspan="4" class="text-center py-12 text-gray-500 dark:text-gray-400"><i class="fa-solid fa-trophy text-4xl text-gray-300 dark:text-gray-600 block mb-3" aria-hidden="true"></i>No reports yet. Be the first to <a href="https://github.com/OWASP-BLT/BLT-Pages/issues/new?template=bug_report.yml" class="text-primary underline hover:no-underline">report a bug</a>!</td></tr>`;
            } else {
              const maxLb = payload.leaderboard[0].count || 1;
              leaderboardRowsHtml = payload.leaderboard.map(entry => {
                const rankDisplay = entry.rank <= 3
                  ? `<span class="text-xl" aria-label="Rank ${entry.rank}">${rankIcons[entry.rank-1]}</span>`
                  : `<span class="font-bold text-gray-500 dark:text-gray-400">#${entry.rank}</span>`;
                const rowClass = entry.rank <= 3 ? 'bg-active-bg dark:bg-red-900/10' : 'hover:bg-gray-50 dark:hover:bg-gray-800/50';
                const pct = Math.min(100, (entry.count / maxLb) * 100);
                const profileUrl = escHtml(entry.profile_url || `https://github.com/${entry.login}`);
                const avatarUrl = escHtml(entry.avatar_url || `https://github.com/${entry.login}.png`);
                const login = escHtml(entry.login);
                return `<tr class="${rowClass} transition-colors"><td class="px-4 py-3 text-center w-12">${rankDisplay}</td><td class="px-4 py-3"><a href="${profileUrl}" target="_blank" rel="noopener noreferrer" class="flex items-center gap-3 group min-w-0"><img src="${avatarUrl}" alt="${login}&#039;s avatar" class="w-8 h-8 rounded-full border border-neutral-border dark:border-gray-700 flex-shrink-0" loading="lazy" onerror="this.src=&#039;https://github.com/identicons/${login}.png&#039;" /><span class="font-medium text-gray-900 dark:text-white group-hover:text-primary transition-colors truncate min-w-0 flex-1">${login}</span></a><div class="flex sm:hidden items-center gap-2 mt-1 pl-11"><span class="inline-flex items-center gap-1 font-bold text-gray-900 dark:text-white text-xs"><i class="fa-solid fa-bug text-primary text-xs" aria-hidden="true"></i>${fmtNum(entry.count)}</span><div class="bg-gray-100 dark:bg-gray-700 rounded-full h-1.5 flex-1 overflow-hidden"><div class="bg-primary h-1.5 rounded-full" style="width:${pct}%"></div></div></div></td><td class="hidden px-4 py-3 text-right sm:table-cell"><span class="inline-flex items-center gap-1 font-bold text-gray-900 dark:text-white"><i class="fa-solid fa-bug text-primary text-xs" aria-hidden="true"></i>${fmtNum(entry.count)}</span></td><td class="px-4 py-3 hidden sm:table-cell"><div class="flex justify-end"><div class="bg-gray-100 dark:bg-gray-700 rounded-full h-2 w-24 overflow-hidden"><div class="bg-primary h-2 rounded-full" style="width:${pct}%"></div></div></div></td></tr>`;
              }).join('');
            }
            html = html.replace(
              /<!-- SSR:leaderboard-rows -->[\s\S]*?<!-- \/SSR:leaderboard-rows -->/,
              `<!-- SSR:leaderboard-rows -->${leaderboardRowsHtml}<!-- /SSR:leaderboard-rows -->`
            );
            html = html.replace(
              /(<tbody id="leaderboard-rows")(?:\s+data-pre-rendered="true")?([^>]*>)/,
              '$1 data-pre-rendered="true"$2'
            );

            // ── Pre-render commenters rows ─────────────────────────────────
            let commentersRowsHtml;
            const commenters = payload.top_commenters || [];
            if (commenters.length === 0) {
              commentersRowsHtml = `<tr><td colspan="4" class="text-center py-12 text-gray-500 dark:text-gray-400"><i class="fa-solid fa-comment text-4xl text-gray-300 dark:text-gray-600 block mb-3" aria-hidden="true"></i>No comments yet. Start a conversation on a <a href="https://github.com/OWASP-BLT/BLT-Pages/issues" class="text-primary underline hover:no-underline" target="_blank" rel="noopener noreferrer">bug report</a>!</td></tr>`;
            } else {
              const maxCm = commenters[0].count || 1;
              commentersRowsHtml = commenters.map(entry => {
                const rankDisplay = entry.rank <= 3
                  ? `<span class="text-xl" aria-label="Rank ${entry.rank}">${rankIcons[entry.rank-1]}</span>`
                  : `<span class="font-bold text-gray-500 dark:text-gray-400">#${entry.rank}</span>`;
                const rowClass = entry.rank <= 3 ? 'bg-active-bg dark:bg-red-900/10' : 'hover:bg-gray-50 dark:hover:bg-gray-800/50';
                const pct = Math.min(100, (entry.count / maxCm) * 100);
                const profileUrl = escHtml(entry.profile_url || `https://github.com/${entry.login}`);
                const avatarUrl = escHtml(entry.avatar_url || `https://github.com/${entry.login}.png`);
                const login = escHtml(entry.login);
                return `<tr class="${rowClass} transition-colors"><td class="px-4 py-3 text-center w-12">${rankDisplay}</td><td class="px-4 py-3"><a href="${profileUrl}" target="_blank" rel="noopener noreferrer" class="flex items-center gap-3 group min-w-0"><img src="${avatarUrl}" alt="${login}&#039;s avatar" class="w-8 h-8 rounded-full border border-neutral-border dark:border-gray-700 flex-shrink-0" loading="lazy" onerror="this.src=&#039;https://github.com/identicons/${login}.png&#039;" /><span class="font-medium text-gray-900 dark:text-white group-hover:text-primary transition-colors truncate min-w-0 flex-1">${login}</span></a><div class="flex sm:hidden items-center gap-2 mt-1 pl-11"><span class="inline-flex items-center gap-1 font-bold text-gray-900 dark:text-white text-xs"><i class="fa-solid fa-comment text-primary text-xs" aria-hidden="true"></i>${fmtNum(entry.count)}</span><div class="bg-gray-100 dark:bg-gray-700 rounded-full h-1.5 flex-1 overflow-hidden"><div class="bg-primary h-1.5 rounded-full" style="width:${pct}%"></div></div></div></td><td class="hidden px-4 py-3 text-right sm:table-cell"><span class="inline-flex items-center gap-1 font-bold text-gray-900 dark:text-white"><i class="fa-solid fa-comment text-primary text-xs" aria-hidden="true"></i>${fmtNum(entry.count)}</span></td><td class="px-4 py-3 hidden sm:table-cell"><div class="flex justify-end"><div class="bg-gray-100 dark:bg-gray-700 rounded-full h-2 w-24 overflow-hidden"><div class="bg-primary h-2 rounded-full" style="width:${pct}%"></div></div></div></td></tr>`;
              }).join('');
            }
            html = html.replace(
              /<!-- SSR:commenters-rows -->[\s\S]*?<!-- \/SSR:commenters-rows -->/,
              `<!-- SSR:commenters-rows -->${commentersRowsHtml}<!-- /SSR:commenters-rows -->`
            );
            html = html.replace(
              /(<tbody id="commenters-rows")(?:\s+data-pre-rendered="true")?([^>]*>)/,
              '$1 data-pre-rendered="true"$2'
            );

            // ── Pre-render domains rows ────────────────────────────────────
            let domainsRowsHtml;
            const domains = payload.top_domains || [];
            if (domains.length === 0) {
              domainsRowsHtml = `<tr><td colspan="4" class="text-center py-12 text-gray-500 dark:text-gray-400"><i class="fa-solid fa-globe text-4xl text-gray-300 dark:text-gray-600 block mb-3" aria-hidden="true"></i>No domain data yet. <a href="https://github.com/OWASP-BLT/BLT-Pages/issues/new?template=bug_report.yml" class="text-primary underline hover:no-underline">Be the first to report a bug!</a></td></tr>`;
            } else {
              const maxDm = domains[0].count || 1;
              domainsRowsHtml = domains.map(entry => {
                const rankDisplay = entry.rank <= 3
                  ? `<span class="text-xl" aria-label="Rank ${entry.rank}">${rankIcons[entry.rank-1]}</span>`
                  : `<span class="font-bold text-gray-500 dark:text-gray-400">#${entry.rank}</span>`;
                const rowClass = entry.rank <= 3 ? 'bg-active-bg dark:bg-red-900/10' : 'hover:bg-gray-50 dark:hover:bg-gray-800/50';
                const pct = Math.min(100, (entry.count / maxDm) * 100);
                const domain = escHtml(entry.domain);
                const safeHref = SAFE_HOSTNAME_RE.test(entry.domain) ? `https://${domain}` : '#';
                const faviconUrl = `https://www.google.com/s2/favicons?domain=${encodeURIComponent(entry.domain)}&sz=32`;
                return `<tr class="${rowClass} transition-colors"><td class="px-4 py-3 text-center w-12">${rankDisplay}</td><td class="px-4 py-3"><a href="${safeHref}" target="_blank" rel="noopener noreferrer" class="flex items-center gap-3 group min-w-0"><img src="${escHtml(faviconUrl)}" alt="${domain} favicon" class="w-5 h-5 rounded flex-shrink-0" loading="lazy" onerror="this.outerHTML=&#039;<i class=\\'fa-solid fa-globe text-gray-400 w-5 h-5 flex-shrink-0\\' aria-hidden=\\'true\\'></i>&#039;" /><span class="font-medium text-gray-900 dark:text-white group-hover:text-primary transition-colors truncate min-w-0 flex-1">${domain}</span></a><div class="flex sm:hidden items-center gap-2 mt-1 pl-8"><span class="inline-flex items-center gap-1 font-bold text-gray-900 dark:text-white text-xs"><i class="fa-solid fa-bug text-primary text-xs" aria-hidden="true"></i>${fmtNum(entry.count)}</span><div class="bg-gray-100 dark:bg-gray-700 rounded-full h-1.5 flex-1 overflow-hidden"><div class="bg-primary h-1.5 rounded-full" style="width:${pct}%"></div></div></div></td><td class="hidden px-4 py-3 text-right sm:table-cell"><span class="inline-flex items-center gap-1 font-bold text-gray-900 dark:text-white"><i class="fa-solid fa-bug text-primary text-xs" aria-hidden="true"></i>${fmtNum(entry.count)}</span></td><td class="px-4 py-3 hidden sm:table-cell"><div class="flex justify-end"><div class="bg-gray-100 dark:bg-gray-700 rounded-full h-2 w-24 overflow-hidden"><div class="bg-primary h-2 rounded-full" style="width:${pct}%"></div></div></div></td></tr>`;
              }).join('');
            }
            html = html.replace(
              /<!-- SSR:domains-rows -->[\s\S]*?<!-- \/SSR:domains-rows -->/,
              `<!-- SSR:domains-rows -->${domainsRowsHtml}<!-- /SSR:domains-rows -->`
            );
            html = html.replace(
              /(<tbody id="domains-rows")(?:\s+data-pre-rendered="true")?([^>]*>)/,
              '$1 data-pre-rendered="true"$2'
            );

            // ── Pre-render recent bugs grid ────────────────────────────────
            let recentBugsHtml;
            const bugs = payload.recent_bugs || [];
            if (bugs.length === 0) {
              recentBugsHtml = `<div class="col-span-3 text-center py-12 text-gray-400 dark:text-gray-500"><i class="fa-solid fa-bug text-4xl text-gray-300 dark:text-gray-600 block mb-3" aria-hidden="true"></i>No bug reports yet. <a href="https://github.com/OWASP-BLT/BLT-Pages/issues/new?template=bug_report.yml" class="text-primary hover:underline">Be the first to report!</a></div>`;
            } else {
              recentBugsHtml = bugs.map(bug => {
                const imgHtml = bug.image_url
                  ? `<div class="aspect-video bg-gray-100 dark:bg-gray-800 rounded-xl mb-4 overflow-hidden flex-shrink-0"><img src="${escHtml(bug.image_url)}" alt="Bug screenshot" class="w-full h-full object-cover" loading="lazy" onerror="this.parentElement.classList.add(&#039;hidden&#039;)" /></div>`
                  : `<div class="aspect-video bg-gray-100 dark:bg-gray-800 rounded-xl mb-4 flex items-center justify-center flex-shrink-0"><i class="fa-solid fa-bug text-4xl text-gray-300 dark:text-gray-600" aria-hidden="true"></i></div>`;
                const date = new Date(bug.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                const avatarUrl = escHtml(bug.user.avatar_url || `https://github.com/${bug.user.login}.png`);
                const profileUrl = escHtml(bug.user.profile_url || `https://github.com/${bug.user.login}`);
                const login = escHtml(bug.user.login);
                const reactionsHtml = ssrReactions(bug.reactions);
                const faviconHtml = bug.domain
                  ? `<img src="${escHtml(`https://www.google.com/s2/favicons?domain=${encodeURIComponent(bug.domain)}&sz=32`)}" alt="${escHtml(bug.domain)} favicon" class="w-4 h-4 rounded flex-shrink-0 inline-block align-middle mr-1" loading="lazy" referrerpolicy="no-referrer" onerror="this.outerHTML=&#039;<i class=\\'fa-solid fa-globe text-gray-400 w-4 h-4\\' aria-hidden=\\'true\\'></i>&#039;" />`
                  : '';
                const commentCount = bug.comment_count;
                let commentHtml = '';
                if (typeof commentCount === 'number' && commentCount > 0 && bug.latest_comment) {
                  const c = bug.latest_comment.user;
                  const cAvatar = escHtml(c.avatar_url || `https://github.com/${c.login}.png`);
                  const cProfile = escHtml(c.profile_url || `https://github.com/${c.login}`);
                  const cLogin = escHtml(c.login);
                  const cBody = escHtml((bug.latest_comment.body || '').replace(/\s+/g, ' ').trim());
                  const cLabel = commentCount === 1 ? '1 comment' : `${fmtNum(commentCount)} comments`;
                  commentHtml = `<div class="mt-3 pt-3 border-t border-neutral-border dark:border-gray-700"><div class="flex items-start gap-2"><a href="${cProfile}" target="_blank" rel="noopener noreferrer" class="flex-shrink-0"><img src="${cAvatar}" alt="${cLogin}&#039;s avatar" class="w-6 h-6 rounded-full border border-neutral-border dark:border-gray-700" loading="lazy" onerror="this.src=&#039;https://github.com/identicons/${cLogin}.png&#039;" /></a><div class="min-w-0 flex-1"><p class="text-xs text-gray-600 dark:text-gray-400 line-clamp-2">${cBody}</p><a href="${escHtml(bug.html_url)}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-1 mt-1 text-xs text-gray-400 hover:text-primary transition-colors"><i class="fa-solid fa-comment text-xs" aria-hidden="true"></i>${cLabel}</a></div></div></div>`;
                } else if (typeof commentCount === 'number' && commentCount === 0) {
                  commentHtml = `<div class="mt-3 pt-3 border-t border-neutral-border dark:border-gray-700"><a href="${escHtml(bug.html_url)}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-1 text-xs text-primary hover:underline"><i class="fa-solid fa-comment text-xs" aria-hidden="true"></i>Be the first to comment</a></div>`;
                }
                return `<div class="bg-white dark:bg-dark-base border border-neutral-border dark:border-gray-700 rounded-2xl p-5 shadow-sm hover:shadow-md transition-shadow flex flex-col">${imgHtml}<h3 class="font-semibold text-gray-900 dark:text-white mb-3 line-clamp-2 flex-1"><a href="${escHtml(bug.html_url)}" target="_blank" rel="noopener noreferrer" class="hover:text-primary transition-colors">${faviconHtml}${escHtml(bug.title)}</a></h3><div class="flex items-center justify-between gap-3 mt-auto pt-3 border-t border-neutral-border dark:border-gray-700 flex-wrap"><div class="flex items-center gap-3"><a href="${profileUrl}" target="_blank" rel="noopener noreferrer" class="flex items-center gap-2 group"><img src="${avatarUrl}" alt="${login}&#039;s avatar" class="w-7 h-7 rounded-full border border-neutral-border dark:border-gray-700" loading="lazy" onerror="this.src=&#039;https://github.com/identicons/${login}.png&#039;" /><span class="text-sm font-medium text-gray-700 dark:text-gray-300 group-hover:text-primary transition-colors">${login}</span></a>${reactionsHtml}</div><span class="text-xs text-gray-400 dark:text-gray-500">${date}</span></div>${commentHtml}</div>`;
              }).join('');
            }
            html = html.replace(
              /<!-- SSR:recent-bugs -->[\s\S]*?<!-- \/SSR:recent-bugs -->/,
              `<!-- SSR:recent-bugs -->${recentBugsHtml}<!-- /SSR:recent-bugs -->`
            );
            html = html.replace(
              /(<div id="recent-bugs-grid")(?:\s+data-pre-rendered="true")?([^>]*>)/,
              '$1 data-pre-rendered="true"$2'
            );

            fs.writeFileSync(indexPath, html);

            console.log(
              `Leaderboard updated: ${bugIssues.length} bugs, ` +
              `${leaderboard.length} reporters, ${orgSet.size} orgs, ` +
              `${topCommenters.length} commenters, ${payload.total_domains} domains`
            );

      - name: Commit updated leaderboard
        if: github.event_name != 'push' || github.actor != 'github-actions[bot]'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/leaderboard.json index.html
          if git diff --quiet --cached; then
            echo "No changes detected – skipping commit."
          else
            git commit -m "chore: update leaderboard data"
            git push
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the entire repository root (static HTML site)
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Report deployment status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const deployUrl = '${{ steps.deployment.outputs.page_url }}';
            const status    = '${{ job.status }}';
            const icon      = status === 'success' ? '✅' : status === 'cancelled' ? '⚠️' : '❌';
            const eventName = context.eventName;
            const actor     = context.actor;
            const sha       = context.sha.slice(0, 7);

            let triggerLine = `**Trigger:** \`${eventName}\``;
            if (eventName === 'push') {
              triggerLine += ` by **${actor}** (${sha})`;
            } else if (eventName === 'schedule') {
              triggerLine += ` (scheduled)`;
            }

            const lines = [
              `## ${icon} GitHub Pages Deployment`,
              '',
              `**Status:** ${status}`,
              triggerLine,
            ];

            if (deployUrl) {
              lines.push(`**URL:** ${deployUrl}`);
            }

            await core.summary
              .addRaw(lines.join('\n'))
              .write();
