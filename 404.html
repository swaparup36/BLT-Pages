<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Page not found - OWASP BLT" />
  <title>404 – Page Not Found · OWASP BLT</title>
  <link rel="icon" type="image/png" href="/static/logo.png" />

  <script>
    (function() {
      try {
        var saved = localStorage.getItem('blt-theme');
        if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      } catch (e) {}
    })();
  </script>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#E10101',
            'primary-hover': '#B91C1C',
            'neutral-border': '#E5E5E5',
            'dark-base': '#111827',
            'dark-surface': '#1F2937',
            'active-bg': '#feeae9'
          },
          fontFamily: {
            sans: ['Manrope', 'ManropeFallback', 'ui-sans-serif', 'system-ui', 'sans-serif']
          },
          boxShadow: {
            soft: '0 14px 40px -28px rgba(17, 24, 39, 0.35)'
          }
        }
      }
    };
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=optional" rel="stylesheet" />

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />

  <style>
    :root {
      --blt-primary: #E10101;
      --blt-border: #E5E5E5;
      --blt-surface: #ffffff;
      --blt-background: #f8fafc;
    }

    .dark {
      --blt-primary: #EF4444;
      --blt-border: #374151;
      --blt-surface: #1F2937;
      --blt-background: #111827;
    }

    body {
      background: var(--blt-background);
      transition: background-color 0.3s ease;
    }

    .hero-glow {
      background:
        radial-gradient(circle at 18% 8%, rgba(225, 1, 1, 0.14), transparent 40%),
        radial-gradient(circle at 78% 0%, rgba(225, 1, 1, 0.1), transparent 28%),
        linear-gradient(to bottom, #ffffff 0%, #f8fafc 70%);
      transition: background 0.3s ease;
    }

    .dark .hero-glow {
      background:
        radial-gradient(circle at 18% 8%, rgba(239, 68, 68, 0.12), transparent 40%),
        radial-gradient(circle at 78% 0%, rgba(239, 68, 68, 0.08), transparent 28%),
        linear-gradient(to bottom, #1F2937 0%, #111827 70%);
    }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #f3f4f6; }
    .dark ::-webkit-scrollbar-track { background: #1F2937; }
    ::-webkit-scrollbar-thumb { background: #E10101; border-radius: 999px; }
    .dark ::-webkit-scrollbar-thumb { background: #EF4444; }

    @font-face {
      font-family: 'ManropeFallback';
      src: local('ui-sans-serif'), local('system-ui'), local('Arial');
      ascent-override: 93%;
      descent-override: 23%;
      line-gap-override: 0%;
      size-adjust: 100%;
    }
  </style>
</head>

<body class="flex min-h-screen flex-col font-sans text-gray-900 antialiased dark:bg-dark-base dark:text-gray-100">
  <div class="pointer-events-none fixed inset-x-0 top-0 -z-10 h-[420px] hero-glow"></div>

  <!-- Header -->
  <header class="sticky top-0 z-50 border-b border-neutral-border bg-white/95 backdrop-blur dark:border-gray-700 dark:bg-dark-surface/95">
    <div class="mx-auto flex h-16 max-w-7xl items-center justify-between px-4 sm:px-6 lg:px-8">
      <a href="/" class="flex items-center gap-3" aria-label="OWASP BLT home">
        <img
          src="/static/logo.png"
          alt="BLT logo"
          class="h-8 w-8 rounded-md object-contain"
          onerror="this.classList.add('hidden'); this.nextElementSibling.classList.remove('hidden'); this.nextElementSibling.classList.add('inline-flex');"
        />
        <span class="hidden h-9 w-9 items-center justify-center rounded-md bg-primary text-sm font-extrabold text-white">B</span>
        <div>
          <p class="text-sm font-extrabold leading-none dark:text-gray-100">OWASP BLT</p>
          <p class="text-xs font-semibold text-gray-500 dark:text-gray-400">OWASP Bug Logging Tool</p>
        </div>
      </a>

      <div class="flex items-center gap-2">
        <button
          id="dark-toggle"
          class="inline-flex h-10 w-10 items-center justify-center rounded-md border border-neutral-border text-gray-700 transition hover:bg-gray-100 dark:border-gray-600 dark:text-gray-300 dark:hover:bg-gray-700"
          aria-label="Toggle dark mode"
          type="button"
        >
          <i class="fa-solid fa-moon dark:hidden" aria-hidden="true"></i>
          <i class="fa-solid fa-sun hidden dark:inline-block" aria-hidden="true"></i>
        </button>
        <a
          href="https://zero.owaspblt.org"
          target="_blank"
          rel="noopener noreferrer"
          class="hidden items-center rounded-md border border-primary px-4 py-2 text-sm font-semibold text-primary transition hover:bg-primary hover:text-white dark:border-red-500 dark:text-red-400 dark:hover:bg-red-600 dark:hover:text-white sm:inline-flex"
        >
          <i class="fa-solid fa-shield-halved mr-2" aria-hidden="true"></i>BLT-Zero
        </a>
        <a
          href="/"
          class="inline-flex items-center rounded-md border border-neutral-border px-4 py-2 text-sm font-semibold text-gray-700 transition hover:border-primary hover:text-primary dark:border-gray-600 dark:text-gray-300 dark:hover:border-red-500 dark:hover:text-red-400"
        >
          <i class="fa-solid fa-arrow-left mr-2 text-xs" aria-hidden="true"></i>Back to Home
        </a>
      </div>
    </div>
  </header>

  <!-- Main 404 content -->
  <main class="flex flex-1 items-center justify-center py-20 px-4">
    <div class="mx-auto max-w-lg text-center">
      <!-- Big 404 number -->
      <p class="text-[9rem] font-extrabold leading-none tracking-tight text-primary/20 dark:text-red-500/20 select-none" aria-hidden="true">404</p>

      <!-- Icon -->
      <div class="mx-auto -mt-6 mb-6 flex h-16 w-16 items-center justify-center rounded-2xl bg-active-bg dark:bg-red-950/30">
        <i class="fa-solid fa-bug text-2xl text-primary dark:text-red-400" aria-hidden="true"></i>
      </div>

      <h1 class="mb-3 text-3xl font-extrabold text-gray-900 dark:text-gray-100 sm:text-4xl">Page not found</h1>
      <p class="mb-8 text-base leading-relaxed text-gray-500 dark:text-gray-400">
        Looks like this page has a bug — or it never existed.<br />
        Let's get you back on track.
      </p>

      <!-- Action buttons -->
      <div class="flex flex-col items-center gap-3 sm:flex-row sm:justify-center">
        <a
          href="/"
          class="inline-flex w-full items-center justify-center rounded-xl bg-primary px-6 py-3 text-sm font-bold text-white shadow-sm transition hover:bg-primary-hover focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary sm:w-auto"
        >
          <i class="fa-solid fa-house mr-2 text-xs" aria-hidden="true"></i>Go to Homepage
        </a>
        <a
          href="/report-bug.html"
          class="inline-flex w-full items-center justify-center rounded-xl border border-neutral-border bg-white px-6 py-3 text-sm font-bold text-gray-700 shadow-sm transition hover:border-primary hover:text-primary dark:border-gray-600 dark:bg-dark-surface dark:text-gray-300 dark:hover:border-red-500 dark:hover:text-red-400 sm:w-auto"
        >
          <i class="fa-solid fa-bug mr-2 text-xs" aria-hidden="true"></i>Report a Bug
        </a>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="border-t border-neutral-border bg-white dark:border-gray-700 dark:bg-dark-surface">
    <div class="mx-auto flex max-w-7xl flex-col items-center justify-between gap-3 px-4 py-6 sm:flex-row sm:px-6 lg:px-8">
      <p class="text-xs text-gray-400 dark:text-gray-500">&copy; <span id="footer-year"></span> OWASP Foundation and BLT Contributors · AGPLv3</p>
      <a href="/" class="text-xs text-red-600 hover:underline dark:text-red-400">Back to OWASP BLT</a>
    </div>
  </footer>

  <script>
    // Footer year
    document.getElementById('footer-year').textContent = new Date().getFullYear();

    // Dark mode toggle (mirrors other pages)
    (function () {
      const root = document.documentElement;
      const btn = document.getElementById('dark-toggle');
      const stored = localStorage.getItem('blt-theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

      if (stored === 'dark' || (!stored && prefersDark)) {
        root.classList.add('dark');
      }

      btn.addEventListener('click', function () {
        const isDark = root.classList.toggle('dark');
        localStorage.setItem('blt-theme', isDark ? 'dark' : 'light');
      });
    })();
  </script>
</body>
</html>
